    - '(.*\.)?stackoverflow\.com$'
    - '(.*\.)?stackexchange\.com$'
    - '(.*\.)?github\.com$'
    - '(.*\.)?gitlab\.com$'
    - '(.*\.)?python\.org$'
    - '(.*\.)?docs\.rs$'
    - '(.*\.)?rust-lang\.org$'
    - '(.*\.)?cppreference\.com$'
    - '(.*\.)?archlinux\.org$'
    - '(.*\.)?postgresql\.org$'
    - '(.*\.)?man7\.org$'
    - 'docs\.aws\.amazon\.com$'
    - 'learn\.microsoft\.com$'
    - 'support\.microsoft\.com$'
    - 'developer\.apple\.com$'
    - 'support\.apple\.com$'
    # Community & Discussion
    - '(.*\.)?reddit\.com$'
    - '(.*\.)?ycombinator\.com$'
    # News & Media - free, quality sources
    - '(.*\.)?theguardian\.com$'        # No paywall, donation-supported (UK)
