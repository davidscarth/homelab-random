    - '(.*\.)?bbc\.com$'                # No paywall, publicly funded (UK)
    - '(.*\.)?apnews\.com$'             # Wire service, no paywall
    - '(.*\.)?reuters\.com$'            # Wire service, no paywall (has dedicated SearXNG engine)
    - '(.*\.)?npr\.org$'                # Publicly funded, no paywall (US)
