    - '(.*\.)?sourceforge\.net$'
    - '(.*\.)?tutorialspoint\.com$'
    - '(.*\.)?slideshare\.net$'
    - '(.*\.)?nytimes\.com$'            # Hard paywall - but useful clickable links for humans
    - '(.*\.)?washingtonpost\.com$'     # Soft paywall - but useful clickable links for humans
    - '(.*\.)?amazon\.com$'             # E-commerce clutter for LLM - but useful product links for humans
    - '(.*\.)?amazon\.co\.uk$'          # Regional variant
    # Low quality gTLDs - may have some legitimate uses, notable spamhaus rankings
    - '.*\.gay$'        # 2 (Malware category)
