# SearXNG Settings — Private Instance for LLM / Local AI access
#
# Tuned for: security, privacy, and search quality as an AI search feed.
# Loosely based on Kagi community domain stats (July 2026) and editorial curation.
#
# 7/9/2026

use_default_settings: yes

# Server -------------------------------------------------------
server:
  secret_key: "[REDACTED]"      # CHANGE THIS — use: openssl rand -hex 32
  bind_address: "0.0.0.0"       # Using 0.0.0.0 here for Docker inter-container access
                                # Normally for local-only use, set bind_address to 127.0.0.1
  port: 8080
  limiter: false                # Set to 'true' to enable rate limiting (requires Valkey/Redis)
  public_instance: false        # Disable public instance features
  image_proxy: true             # Proxy images to avoid IP leaks to source servers
  method: "POST"                # Keep queries out of URLs/logs/history
  default_http_headers:         # Explicit security headers
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

# Search -------------------------------------------------------
search:
  safe_search: 0
  default_lang: "en"            # Set language explicitly
  formats:
    - html
    - json                      # Required for OpenWebUI integration
# General ------------------------------------------------------
general:
  instance_name: "searxng-internal"

# UI -----------------------------------------------------------
ui:
  query_in_title: false         # Don't leak queries into browser history/titles

# Outgoing (communication with search engines) -----------------
outgoing:
  enable_http2: true            # Explicit HTTP/2 for efficiency

# Plugins ------------------------------------------------------
plugins:
  searx.plugins.hostnames.SXNGPlugin:           # Allows us to rewrite hostnames, remove results, or prioritize them
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin: # Strip UTM/tracking params from result URLs
    active: true
  searx.plugins.oa_doi_rewrite.SXNGPlugin:      # So we can bypass scholarly article paywalls
    active: true
  searx.plugins.calculator.SXNGPlugin:          # Disable plugin unused by LLM
    active: false
  searx.plugins.unit_converter.SXNGPlugin:      # Disable plugin unused by LLM
    active: false
  searx.plugins.self_info.SXNGPlugin:           # Disable plugin unused by LLM
    active: false
  searx.plugins.hash_plugin.SXNGPlugin:         # Disable plugin unused by LLM
    active: false

# Hostnames Plugin Configuration
hostnames:
  replace:              # frontend swaps
    '(www\.)?twitter\.com$': 'nitter.net'
    '(www\.)?x\.com$': 'nitter.net'
    #'(.*\.)?youtube\.com$': 'invidious.local'   # Uncomment if deploying invidious (https://invidious.io/)
    #'(.*\.)?youtu\.be$': 'invidious.local'      # Uncomment if deploying invidious (https://invidious.io/)
    #'(www\.)?reddit\.com$': 'redlib.local'      # Uncomment if deploying redlib (https://github.com/redlib-org/redlib)
  high_priority:        # high quality, free/open access
    # Knowledge & Reference
    - '(.*\.)?wikipedia\.org$'
    - '(.*\.)?wiktionary\.org$'
    - '(.*\.)?merriam-webster\.com$'
    - '(.*\.)?archive\.org$'
    - 'plato\.stanford\.edu$'
