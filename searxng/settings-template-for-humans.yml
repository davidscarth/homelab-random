    - '^.*\.gay$'       # 2 (Malware category)
    - '^.*\.shop$'      # 47 (General)
    - '^.*\.site$'      # 105 (General)
    - '^.*\.work$'      # 112 (General)
    - '^.*\.xyz$'       # 118 (General)
    - '^.*\.online$'    # 119 (General)
    - '^.*\.today$'     # Ranked 4th on Interisle Phishing Landscape 2025
    # Low quality ccTLDs - may have some legitimate uses
    - '^.*\.ru$'        # Russia - top 3 malware / top 3 phishing ccTLDs on spamhaus.org
    - '^.*\.cc$'        # Cocos (Keeling) Islands - top 3 malware / top 3 phishing ccTLDs on spamhaus.org
    - '^.*\.my$'        # Malaysia - top 3 malware / top 3 phishing ccTLDs on spamhaus.org
    - '^.*\.cn$'        # China - top 3 malware / top 3 phishing ccTLDs on spamhaus.org
    - '^.*\.vu$'        # Vanuatu - top 3 malware / top 3 phishing ccTLDs on spamhaus.org, 5th on netapi.com/research/tld-abuse/
