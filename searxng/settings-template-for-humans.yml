  low_priority:                 # mediocre quality or occasionally useful
    - '^(.*\.)?play\.google\.com$'
    - '^(.*\.)?etsy\.com$'
    - '^(.*\.)?sourceforge\.net$'
    - '^(.*\.)?tutorialspoint\.com$'
    - '^(.*\.)?slideshare\.net$'
    - '^(.*\.)?nytimes\.com$'           # Hard paywall - but reliable reporting, newspaper of record
    - '^(.*\.)?washingtonpost\.com$'    # Soft paywall - but reliable reporting, newspaper of record
    - '^(.*\.)?amazon\.(com|co\.uk)$'   # E-commerce clutter for LLM - but useful product links for humans
    # Video
    - '^(.*\.)?youtube\.com$'           # LLM can't watch or parse video - but useful video links for humans
    # Low quality Science, Health
    - '^(.*\.)?healthline\.com$'
    - '^(.*\.)?webmd\.com$'
    # Low quality journalism
    - '^(.*\.)?foxnews\.com$'
    - '^(.*\.)?foxbusiness\.com$'
