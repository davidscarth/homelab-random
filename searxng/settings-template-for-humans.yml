# SearXNG Settings â€” Private Instance for Human Use
#
# Tuned for: security, privacy, and search quality as a general search feed.
# Loosely based on Kagi community domain stats (July 2026) and editorial curation.
#
# 7/17/2026

use_default_settings: yes

# Server -------------------------------------------------------
server:
  secret_key: "[REDACTED]"      # CHANGE THIS â€” use: openssl rand -hex 32
  bind_address: "0.0.0.0"       # Using 0.0.0.0 here for Docker container access, use docker port rules to limit access
                                # 127.0.0.1 only works when processes share network (i.e. bare metal, host mode)
  port: 8080
  limiter: false                # Set to 'true' to enable rate limiting (requires Valkey/Redis)
  public_instance: false        # Disables public instance features
  image_proxy: true             # Proxy images to avoid IP leaks to source servers
  method: "POST"                # Keep queries out of URLs/logs/history
  default_http_headers:         # Explicit security headers
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

# Search -------------------------------------------------------
search:
  safe_search: 0
  default_lang: "en"            # Set language explicitly
  formats:
    - html
# General ------------------------------------------------------
general:
  instance_name: "searxng-internal"

# UI -----------------------------------------------------------
ui:
  query_in_title: false         # Don't leak queries into browser history/titles

# Outgoing (communication with search engines) -----------------
outgoing:
  enable_http2: true            # Explicit HTTP/2 for efficiency

# Plugins ------------------------------------------------------
plugins:
  searx.plugins.hostnames.SXNGPlugin:           # Allows us to rewrite hostnames, remove results, or prioritize them
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin: # Strip UTM/tracking params from result URLs
    active: true
  searx.plugins.oa_doi_rewrite.SXNGPlugin:      # So we can retrieve scholarly articles
    active: true

# Hostnames Plugin Configuration
hostnames:
  replace:              # frontend swaps
    '^(www\.)?twitter\.com$': 'nitter.net'
    '^(www\.)?x\.com$': 'nitter.net'
    '^(.*\.)?reddit\.com$': 'old.reddit.com'
    #'^(.*\.)?youtube\.com$': 'invidious.local'  # Uncomment if deploying invidious (https://invidious.io/)
    #'^(.*\.)?youtu\.be$': 'invidious.local'     # Uncomment if deploying invidious (https://invidious.io/)
    #'^(www\.)?reddit\.com$': 'redlib.local'     # Uncomment if deploying redlib (https://github.com/redlib-org/redlib)
  high_priority:        # high quality, free/open access
    # Knowledge & Reference
    - '^(.*\.)?wikipedia\.org$'
    - '^(.*\.)?wiktionary\.org$'
    - '^(.*\.)?merriam-webster\.com$'
    - '^(.*\.)?plato\.stanford\.edu$'
    - '^(.*\.)?law\.cornell\.edu$'
    # Development & Technical Documentation
    - '^(.*\.)?developer\.mozilla\.org$'
    - '^(.*\.)?stackoverflow\.com$'
    - '^(.*\.)?stackexchange\.com$'
    - '^(.*\.)?github\.com$'
    - '^(.*\.)?gitlab\.com$'
    - '^(.*\.)?python\.org$'
    - '^(.*\.)?docs\.rs$'
    - '^(.*\.)?rust-lang\.org$'
    - '^(.*\.)?cppreference\.com$'
    - '^(.*\.)?archlinux\.org$'
    - '^(.*\.)?postgresql\.org$'
    - '^(.*\.)?man7\.org$'
    - '^(.*\.)?docs\.aws\.amazon\.com$'
    - '^(.*\.)?learn\.microsoft\.com$'
    - '^(.*\.)?support\.microsoft\.com$'
    - '^(.*\.)?developer\.apple\.com$'
    - '^(.*\.)?support\.apple\.com$'
    # Community & Discussion
    - '^(.*\.)?reddit\.com$'
    # News & Media - free, quality sources
    - '^(.*\.)?apnews\.com$'            # Wire service, no paywall
    - '^(.*\.)?reuters\.com$'           # Wire service, no paywall (has dedicated SearXNG engine)
    - '^(.*\.)?npr\.org$'               # Publicly funded, no paywall (US)
    - '^(.*\.)?bbc\.(com|co\.uk)$'      # No paywall, publicly funded (UK)
    - '^(.*\.)?theguardian\.com$'       # No paywall, donation-supported (UK)
    - '^(.*\.)?france24\.com$'          # Publicly funded, no paywall (France, has English edition)
    - '^(.*\.)?lemonde\.fr$'            # Freemium (France, has English edition) (~63% free / ~37% abonnĂ©s: blog.poool.fr/battle-of-the-paywalls)
    - '^(.*\.)?dw\.com$'                # Publicly funded, no paywall (Germany, has English edition)
    - '^(.*\.)?abc\.net\.au$'           # Publicly funded, no paywall (Australia)
    - '^(.*\.)?cbc\.ca$'                # Publicly funded, no paywall (Canada)
